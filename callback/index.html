<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to QBO Admin...</title>
  <style>
    body { font-family: Calibri, Arial, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; }
    .box { text-align: center; color: #1F3864; }
    .spinner { border: 4px solid #ddd; border-top: 4px solid #2E75B6;
               border-radius: 50%; width: 40px; height: 40px;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Authorization complete &mdash; returning to QBO Admin&hellip;</p>
  </div>
  <script>
    // Relay: forward Intuit's OAuth callback params to the local Flask app.
    window.location.replace('http://localhost:5000/callback' + window.location.search);
  </script>
</body>
</html>
