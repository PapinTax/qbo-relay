<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canopy Authorization</title>
  <style>
    body { font-family: Calibri, Arial, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; }
    .box { text-align: center; color: #1F3864; max-width: 600px; }
    code { background: #e8f0fe; padding: 8px 16px; border-radius: 4px;
           font-size: 0.85em; word-break: break-all; display: block; margin: 12px 0; }
    button { background: #2E75B6; color: white; border: none; padding: 8px 20px;
             border-radius: 4px; cursor: pointer; font-size: 1em; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Canopy Authorization Complete</h2>
    <p>Copy the code below and paste it into Claude Code:</p>
    <code id="code"></code>
    <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">
      Copy Code
    </button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '(no code found in URL)';
    document.getElementById('code').textContent = code;
  </script>
</body>
</html>
